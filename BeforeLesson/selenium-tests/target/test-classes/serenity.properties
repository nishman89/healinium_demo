# WebDriver Configuration
webdriver.driver=chrome
webdriver.autodownload=true

# Chrome Options
chrome.switches=--remote-allow-origins=*,--disable-web-security,--disable-features=VizDisplayCompositor,--start-maximized

# Browser Settings
serenity.browser.maximized=true
serenity.take.screenshots=AFTER_EACH_STEP

# Timeouts (ms)
webdriver.timeouts.implicitlywait=5000
webdriver.wait.for.timeout=10000

# Healenium + Serenity: two-step provided driver registration
# Step 1: alias used internally by ProvidedDriverConfiguration
webdriver.provided.type=healenium
# Step 2: alias mapped to the actual DriverSource implementation class
webdriver.provided.healenium=com.sparta.nam.HealeniumDriverSource

# Report Configuration
serenity.project.name=Sparta Global Login Tests
serenity.test.root=com.sparta.nam